<body>

  <div class="pull-refresh" id="pullRefresh">下拉刷新新闻</div>

  <nav>AI 科研资讯 · 最新成果</nav>

  <!-- 搜索 -->
  <div class="search-box">
    <h2>搜索 AI 科研资讯</h2>
    <div class="input-group">
      <input type="text" id="keyword" placeholder="输入关键词搜索..." onkeydown="if(event.key==='Enter')search()">
      <button onclick="search()">搜索</button>
    </div>
  </div>

  <!-- 列表 -->
  <div class="news" id="listPage">
    <h3>最新科研成果</h3>
    <div id="newsList"></div>
    <div class="no-result" id="noResult">暂无结果</div>
  </div>

  <!-- 详情 -->
  <div class="detail" id="detailPage">
    <button class="back" onclick="goBack()">返回</button>
    <h2 id="detailTitle"></h2>
    <div class="info" id="detailDesc"></div>
    <div class="time" id="detailTime"></div>
  </div>

  <script>
    let allNews = [];
    let currentList = [];

    // 页面加载
    window.onload = async () => {
      await loadNews();
      bindPullRefresh();
    };

    // 加载新闻
    async function loadNews() {
      const refresh = document.getElementById('pullRefresh');
      refresh.style.top = '0px';
      refresh.innerText = '加载中...';

      try {
        const res = await fetch(`news.json?t=${Date.now()}`);
        allNews = await res.json();
        currentList = [...allNews];
        renderList();
      } catch (e) {
        document.getElementById('newsList').innerHTML = `<div class="item"><h4>加载失败</h4></div>`;
      }

      setTimeout(() => {
        refresh.style.top = '-50px';
        refresh.innerText = '下拉刷新';
      }, 600);
    }

    // 渲染列表
    function renderList(key = '') {
      const list = document.getElementById('newsList');
      const noResult = document.getElementById('noResult');

      if (currentList.length === 0) {
        list.innerHTML = '';
        noResult.style.display = 'block';
        return;
      }

      noResult.style.display = 'none';
      list.innerHTML = currentList.map((n, i) => {
        let title = n.title;
        if (key) {
          const reg = new RegExp(`(${key})`, 'gi');
          title = title.replace(reg, '<span class="highlight">$1</span>');
        }
        return `
          <div class="item" onclick="openDetail(${i})">
            <h4>${title}</h4>
            <div class="time">${n.time || ''}</div>
          </div>
        `;
      }).join('');
    }

    // 搜索
    function search() {
      const key = document.getElementById('keyword').value.trim();
      if (!key) {
        currentList = [...allNews];
        renderList();
        return;
      }
      currentList = allNews.filter(n => 
        n.title.includes(key) || (n.desc || '').includes(key)
      );
      renderList(key);
    }

    // 打开详情
    function openDetail(index) {
      const item = currentList[index];
      document.getElementById('detailTitle').innerText = item.title;
      document.getElementById('detailDesc').innerText = item.desc || '暂无简介';
      document.getElementById('detailTime').innerText = item.time || '';
      document.getElementById('listPage').style.display = 'none';
      document.getElementById('detailPage').style.display = 'block';
    }

    // 返回
    function goBack() {
      document.getElementById('detailPage').style.display = 'none';
      document.getElementById('listPage').style.display = 'block';
    }

    // 下拉刷新
    function bindPullRefresh() {
      let startY = 0;
      document.addEventListener('touchstart', e => startY = e.touches[0].clientY);
      document.addEventListener('touchend', async e => {
        const y = e.changedTouches[0].clientY;
        if (window.scrollY === 0 && y - startY > 100) {
          await loadNews();
        }
      });
    }
  </script>

</body>
</html>
