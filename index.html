<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仆人忠诚度测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #764ba2;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .emoji {
            font-size: 60px;
            margin: 20px 0;
        }
        
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 5px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.4);
        }
        
        .hint {
            color: #999;
            font-size: 14px;
            margin-top: 15px;
        }
        
        /* 惩罚弹窗 */
        .punishment {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }
        
        .punishment.show {
            display: flex;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .pig-image {
            width: 350px;
            height: 350px;
            object-fit: cover;
            border-radius: 20px;
            border: 5px solid #e74c3c;
        }
        
        .dumb-text {
            font-size: 100px;
            color: #e74c3c;
            font-weight: bold;
            margin-top: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .retry-btn {
            margin-top: 30px;
            background: #e74c3c;
        }
        
        /* 成功页面 */
        .success-page {
            display: none;
        }
        
        .success-page.show {
            display: block;
        }
        
        .audio-container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        audio {
            width: 100%;
        }
        
        .success-text {
            color: #27ae60;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <!-- 惩罚弹窗 -->
    <div class="punishment" id="punishment">
        <img src="https://ts3.tc.mm.bing.net/th/id/OIP-C.n_SpF3u2DruJt5L8VdFfKwAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" 
             alt="小猪" class="pig-image">
        <div class="dumb-text">呆子</div>
        <button class="retry-btn" onclick="closePunishment()">再试一次</button>
    </div>

    <div class="container">
        <!-- 问答页面 -->
        <div id="quizPage">
            <h1>👑 仆人忠诚度测试</h1>
            <div class="emoji">🔐</div>
            <p style="font-size: 18px; margin: 20px 0;">你是谁的仆人？</p>
            <p class="hint">💡 输入名字</p>
            <input type="text" id="answerInput" placeholder="???" maxlength="3" autocomplete="off">
            <button onclick="checkAnswer()">提交答案</button>
            <p class="hint">答对可以让你听一听我的秘密🎵</p>
        </div>
        
        <!-- 成功页面 -->
        <div class="success-page" id="successPage">
            <h1>🎉 恭喜你答对了！</h1>
            <div class="emoji">🎵</div>
            <p class="success-text">忠诚度验证通过！</p>
            <div class="audio-container">
                <p style="margin-bottom: 10px;">现在播放：《我的秘密》</p>
                <audio controls id="secretAudio" autoplay>
                    <source src="https://mv6.music.tc.qq.com/0AA17DABE363D1EDC04CFB14513E007E6EB1CC7FF27C955B409975801D146B189744CD6675EB956A2717DCCF122EA086ZZqqmusic_default__v21ea05cc4/qmmv_0b53beaakaaaayajhftduruficiaaueqabka.f9944.m3u8" type="application/x-mpegURL">
                    您的浏览器不支持视频播放
                </audio>
            </div>
            <p style="color: #764ba2; margin-top: 20px;">🎶 感谢你的忠诚！😄</p>
            <button onclick="resetGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 正确答案
        const CORRECT_ANSWER = '乔梦薇';
        let attemptCount = 0;
        
        // 检查答案
        function checkAnswer() {
            const input = document.getElementById('answerInput');
            const answer = input.value.trim().toLowerCase();
            
            if (!answer) {
                alert('请输入答案哦！🤔');
                return;
            }
            
            if (answer.length !== 3) {
                alert('需要输入 3 个首字母哦！😜');
                return;
            }
            
            attemptCount++;
            
            if (answer === CORRECT_ANSWER) {
                // 答对了
                showSuccess();
            } else {
                // 答错了
                showPunishment();
            }
        }
        
        // 显示成功页面
        function showSuccess() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('successPage').classList.add('show');
            
            // 尝试自动播放音频
            const audio = document.getElementById('secretAudio');
            audio.play().catch(function(e) {
                console.log('需要用户点击才能播放音频');
            });
        }
        
        // 显示惩罚
        function showPunishment() {
            const punishment = document.getElementById('punishment');
            punishment.classList.add('show');
            
            // 记录错误次数
            if (attemptCount >= 3) {
                console.log('🐷 你已经错了' + attemptCount + '次了！');
            }
        }
        
        // 关闭惩罚
        function closePunishment() {
            document.getElementById('punishment').classList.remove('show');
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();
        }
        
        // 重置游戏
        function resetGame() {
            attemptCount = 0;
            document.getElementById('answerInput').value = '';
            document.getElementById('quizPage').style.display = 'block';
            document.getElementById('successPage').classList.remove('show');
            
            // 停止音频
            const audio = document.getElementById('secretAudio');
            audio.pause();
            audio.currentTime = 0;
        }
        
        // 支持回车键提交
        document.getElementById('answerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
